<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Admin - Quản lý Hệ thống</title>
    <!-- Thêm FontAwesome cho đẹp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-user-shield"></i> FitTrack Admin</a>
            <a class="btn btn-light fw-medium" href="index.html"><i class="fa-solid fa-house"></i> Về Trang Khách</a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <!-- BẢNG QUẢN LÝ BÀI TẬP (CŨ) -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold"><i class="fa-solid fa-dumbbell"></i> Quản lý Buổi Tập Luyện</h2>
            <button class="btn btn-success fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#workoutFormModal"><i class="fa-solid fa-plus"></i> Thêm Buổi Tập</button>
        </div>

        <div class="table-responsive shadow-sm rounded-3 mb-5">
            <table class="table table-striped table-hover border mb-0" id="workoutTable">
                <thead class="table-dark">
                    <tr>
                        <th>Ngày tạo</th>
                        <th>Tên Buổi</th>
                        <th>Loại</th>
                        <th>Thời gian</th>
                        <th>Calo</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- BẢNG QUẢN LÝ LỊCH SỬ TẬP LUYỆN (MỚI) -->
        <div class="d-flex justify-content-between align-items-center mb-4 mt-5 border-top pt-5">
            <h2 class="text-danger fw-bold"><i class="fa-solid fa-clock-rotate-left"></i> Quản lý Lịch Sử Luyện Tập</h2>
        </div>

        <div class="table-responsive shadow-sm rounded-3 mb-5">
            <table class="table table-striped table-hover border mb-0" id="historyTable">
                <thead class="table-dark">
                    <tr>
                        <th>Ngày tập</th>
                        <th>Tên phiên tập</th>
                        <th>Thời lượng</th>
                        <th>Calo đốt cháy</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Bài Tập -->
    <div class="modal fade" id="workoutFormModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="formTitle">Thêm Buổi Tập Mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light">
                    <form id="workoutForm">
                        <input type="hidden" id="workoutId">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary">Tên buổi tập</label>
                            <input type="text" class="form-control border-secondary" id="name" required placeholder="VD: Tập ngực với tạ đơn">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary">Loại bài tập</label>
                            <select class="form-select border-secondary" id="exerciseType" required></select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-secondary">Thời gian (phút)</label>
                                <input type="number" class="form-control border-secondary" id="duration" required min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-secondary">Calo đốt cháy</label>
                                <input type="number" class="form-control border-secondary" id="calories" required min="1">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary">Nhóm cơ</label>
                            <input type="text" class="form-control border-secondary" id="muscleGroup" placeholder="VD: Cơ ngực, vai, tay sau">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium text-secondary">Ghi chú</label>
                            <textarea class="form-control border-secondary" id="notes" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2"><i class="fa-solid fa-floppy-disk"></i> LƯU THÔNG TIN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
